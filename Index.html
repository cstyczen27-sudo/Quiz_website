<!DOCTYPE html>
<html>
	<head>
	 <title> Your JJBA Stand </title>

	 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" >

	 <link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		<header class="text-center"> Personality quiz </header>

		<h1 id="question">What would Your Stand be In Jojo's Bizarre Adventure</h1>


<p><strong>Q1: What drives you most in a fight?</strong></p>
		<div class="col-6 col-md-3" id="question_1">
			<button class="btn btn-outline-primary w-100" data-buttonid="1" data-awesome="1">A) Protecting the people I love no matter what</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="1" data-awesome="2">B) Proving I'm the strongest — no one can touch me</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="1" data-awesome="3">C) Outsmarting my opponent before they even move</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="1" data-awesome="4">D) Chaos — I just want to see what happens</button>
		</div>
<br>

<p><strong>Q2: Pick your ideal power:</strong></p>
		<div class="col-6 col-md-3" id="question_2">
			<button class="btn btn-outline-primary w-100" data-buttonid="2" data-awesome="1">A) Stopping time — total control of the battlefield</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="2" data-awesome="2">B) Infinite power that grows the harder I'm pushed</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="2" data-awesome="3">C) A very specific rule I can exploit perfectly</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="2" data-awesome="4">D) Something weird and unpredictable no one can prepare for</button>
		</div>
<br>
<p><strong>Q3: How do you handle a losing situation?</strong></p>
		<div class="col-6 col-md-3" id="question_3">
			<button class="btn btn-outline-primary w-100" data-buttonid="3" data-awesome="1">A) I endure it — I'll find the opening eventually</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="3" data-awesome="2">B) I go even harder and break through by force</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="3" data-awesome="3">C) I already planned for this three moves ago</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="3" data-awesome="4">D) I flip the situation into something completely unexpected</button>
		</div>
<br>
<p><strong>Q4: What kind of person are you in a group?</strong></p>
		<div class="col-6 col-md-3" id="question_4">
			<button class="btn btn-outline-primary w-100" data-buttonid="4" data-awesome="1">A) The reliable one — everyone counts on me</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="4" data-awesome="2">B) The leader — I set the pace and others follow</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="4" data-awesome="3">C) The strategist — quiet but always thinking</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="4" data-awesome="4">D) The wildcard — no one knows what I'll do next</button>
		</div>
<br>
<p><strong>Q5: What's most important to you?</strong></p>
		<div class="col-6 col-md-3" id="question_5">
			<button class="btn btn-outline-primary w-100" data-buttonid="5" data-awesome="1">A) Justice and doing what's right</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="5" data-awesome="2">B) Destiny — I was born for greatness</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="5" data-awesome="3">C) Knowledge and understanding the truth</button>
			<button class="btn btn-outline-primary w-100" data-buttonid="5" data-awesome="4">D) Freedom — I live by my own rules alone</button>
		</div>

	<p id="output-message"></p>
	
	<script src="script.js"></script>
	</body>
</html>
